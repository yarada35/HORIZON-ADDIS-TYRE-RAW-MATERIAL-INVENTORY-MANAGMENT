<!-- Save this file inside a templates/ directory or serve it directly via your python engine -->
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Horizon Addis Tyre S.C. - Live Production Interface</title>
    <style>
        :root {
            --bg-matte-black: #121212; --panel-bg: #1e1e1e;
            --glow-yellow: #fff200; --glow-blue: #00d2ff; --glow-white: #ffffff;
            --youtube-red: #ff0000; --alert-green: #00ff66; --alert-orange: #ff9900;
            --border-color: #333333;
        }
        body { background-color: var(--bg-matte-black); color: var(--glow-white); font-family: 'Segoe UI', sans-serif; padding: 15px; }
        header { text-align: center; padding: 10px; border-bottom: 2px solid var(--youtube-red); margin-bottom: 20px; }
        h1 { color: var(--glow-yellow); text-transform: uppercase; }
        .grid { display: grid; grid-template-columns: 1fr; gap: 15px; }
        @media(min-width: 768px) { .grid { grid-template-columns: 1fr 1fr; } .full { grid-column: span 2; } }
        .panel { background: var(--panel-bg); border: 1px solid var(--border-color); padding: 15px; border-radius: 6px; }
        .panel-title { color: var(--glow-blue); text-transform: uppercase; margin-bottom: 15px; font-weight: bold; border-bottom: 1px solid var(--border-color); padding-bottom: 4px; }
        select, input { width: 100%; background: #111; border: 1px solid #444; color: #fff; padding: 10px; border-radius: 4px; margin-bottom: 12px; }
        table { width: 100%; border-collapse: collapse; margin-top: 10px; font-size: 0.85rem; }
        th, td { padding: 10px; border: 1px solid var(--border-color); text-align: left; }
        th { background: #161616; color: var(--glow-yellow); text-transform: uppercase; font-size: 0.72rem; }
        .badge { display: inline-block; padding: 3px 6px; border-radius: 3px; font-weight: bold; font-size: 0.68rem; }
        .badge-safe { background: rgba(0,255,102,0.15); color: var(--alert-green); border: 1px solid var(--alert-green); }
        .badge-crit { background: rgba(255,0,0,0.2); color: var(--youtube-red); border: 1px solid var(--youtube-red); }
    </style>
</head>
<body>

    <header>
        <h1>Horizon Addis Tyre S.C.</h1>
        <h2>Web-Based MRP & Stock Awakening Dashboard</h2>
    </header>

    <div class="grid">
        <div class="panel">
            <div class="panel-title">Operational Controls</div>
            <label>Tyre Size Selection</label>
            <select id="size-sel" onchange="fetchCalculations()"></select>
            
            <label>Daily Production Plan (Pcs)</label>
            <input type="number" id="daily-plan" value="450" oninput="fetchCalculations()">
        </div>

        <div class="panel">
            <div class="panel-title">Warehouse Modifiers</div>
            <label>Beginning Inventory Scaling Factor</label>
            <input type="number" id="beg-mod" value="1.0" step="0.1" oninput="fetchCalculations()">
            
            <label>Work-In-Process (WIP) Scaling Factor</label>
            <input type="number" id="wip-mod" value="1.0" step="0.1" oninput="fetchCalculations()">
        </div>

        <div class="panel full">
            <div class="panel-title">Live Material Pipeline & Horizon Awakening Matrix</div>
            <table>
                <thead>
                    <tr>
                        <th>Material Component</th>
                        <th>Available Stock</th>
                        <th>Daily Consumption</th>
                        <th>Coverage</th>
                        <th>15D</th>
                        <th>30D</th>
                        <th>60D</th>
                        <th>90D</th>
                        <th>150D</th>
                    </tr>
                </thead>
                <tbody id="mrp-table-body"></tbody>
            </table>
        </div>
    </div>

    <script>
        async function init() {
            const res = await fetch('/api/config');
            const config = await res.json();
            const select = document.getElementById('size-sel');
            config.sizes.forEach(size => {
                let opt = document.createElement('option');
                opt.value = size; opt.innerText = size;
                select.appendChild(opt);
            });
            fetchCalculations();
        }

        async function fetchCalculations() {
            const size = document.getElementById('size-sel').value;
            const daily_plan = document.getElementById('daily-plan').value;
            const beg_modifier = document.getElementById('beg-mod').value;
            const wip_modifier = document.getElementById('wip-mod').value;

            if(!size) return;

            const res = await fetch('/api/calculate', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ size, daily_plan, beg_modifier, wip_modifier })
            });
            const data = await res.json();
            
            const tbody = document.getElementById('mrp-table-body');
            tbody.innerHTML = "";
            
            data.breakdown.forEach(row => {
                const tr = document.createElement('tr');
                tr.innerHTML = `
                    <td><strong>${row.material}</strong></td>
                    <td>${row.total_stock.toLocaleString()} kg</td>
                    <td>${row.daily_consumption.toLocaleString()} kg</td>
                    <td><span class="badge ${row.running_days <= 30 ? 'badge-crit' : 'badge-safe'}">${row.running_days} Days</span></td>
                    <td><span class="badge ${row.alarm_15 == 'ALARM' ? 'badge-crit' : 'badge-safe'}">${row.alarm_15}</span></td>
                    <td><span class="badge ${row.alarm_30 == 'ALARM' ? 'badge-crit' : 'badge-safe'}">${row.alarm_30}</span></td>
                    <td><span class="badge ${row.alarm_60 == 'ALARM' ? 'badge-crit' : 'badge-safe'}">${row.alarm_60}</span></td>
                    <td><span class="badge ${row.alarm_90 == 'ALARM' ? 'badge-crit' : 'badge-safe'}">${row.alarm_90}</span></td>
                    <td><span class="badge ${row.alarm_150 == 'ALARM' ? 'badge-crit' : 'badge-safe'}">${row.alarm_150}</span></td>
                `;
                tbody.appendChild(tr);
            });
        }
        window.onload = init;
    </script>
</body>
</html>
